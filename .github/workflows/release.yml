name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: Release tag to build
        required: true
        default: v3.3.0

permissions:
  contents: write

jobs:
  build-tauri:
    name: Build ${{ matrix.label }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: macOS Apple Silicon
            platform: macos-latest
            rustTargets: aarch64-apple-darwin
            args: --target aarch64-apple-darwin
          - label: macOS Intel
            platform: macos-latest
            rustTargets: x86_64-apple-darwin
            args: --target x86_64-apple-darwin
          - label: Linux
            platform: ubuntu-22.04
            rustTargets: ""
            args: ""
          - label: Windows x64
            platform: windows-latest
            rustTargets: x86_64-pc-windows-msvc
            args: --target x86_64-pc-windows-msvc --bundles nsis
          - label: Windows ARM64
            platform: windows-latest
            rustTargets: aarch64-pc-windows-msvc
            args: --target aarch64-pc-windows-msvc --bundles nsis

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rustTargets }}

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf xdg-utils

      - name: Install frontend dependencies
        run: npm ci --legacy-peer-deps

      - name: Build and upload Tauri bundles
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref_name }}
          releaseName: CopyShare ${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref_name }}
          releaseBody: |
            ## 更新内容

            构建完成后将由发布脚本写入本版本的中文更新重点。

            构建产物：
            - Windows x64 安装包
            - Windows ARM64 安装包
            - macOS Apple Silicon 安装包
            - macOS Intel 安装包
            - Linux 安装包
          releaseDraft: true
          prerelease: false
          retryAttempts: 2
          uploadWorkflowArtifacts: true
          args: ${{ matrix.args }}
