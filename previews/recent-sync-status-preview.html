<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>CopyShare 最近同步内容状态标签预览</title>
  <style>
    :root {
      --bg: #171717;
      --panel: #252525;
      --panel-soft: #2b2b2b;
      --field: #202020;
      --line: #3d3d3d;
      --line-soft: #343434;
      --text: #f3f3f3;
      --muted: #9ca3af;
      --subtle: #718096;
      --synced-bg: #1f352c;
      --synced-line: #4f8d75;
      --synced-text: #b8e5d0;
      --unsynced-bg: #393329;
      --unsynced-line: #8b7a55;
      --unsynced-text: #e2d0a4;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #111;
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif;
    }

    .frame {
      width: 1280px;
      height: 580px;
      padding: 44px 55px;
      background: var(--bg);
    }

    .card {
      height: 100%;
      border-radius: 10px;
      border: 1px solid var(--line);
      background: var(--panel);
      padding: 28px 30px;
      box-shadow: 0 20px 58px rgba(0,0,0,.32), inset 0 1px 0 rgba(255,255,255,.05);
    }

    .inner {
      height: 100%;
      border-radius: 9px;
      border: 1px solid var(--line);
      background: var(--panel-soft);
      padding: 24px;
    }

    .head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
      margin-bottom: 24px;
    }

    h1 {
      margin: 0;
      font-size: 24px;
      line-height: 32px;
      letter-spacing: 0;
    }

    .meta {
      display: flex;
      align-items: center;
      gap: 28px;
      color: var(--subtle);
      font-size: 16px;
    }

    .more {
      color: #d6d6d6;
      font-weight: 600;
    }

    .list {
      display: grid;
      gap: 12px;
    }

    .row {
      min-height: 62px;
      display: grid;
      grid-template-columns: minmax(0,1fr) auto auto;
      align-items: center;
      gap: 14px;
      border-radius: 8px;
      border: 1px solid var(--line-soft);
      background: var(--field);
      padding: 0 16px 0 18px;
    }

    .text {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      color: #d9dee7;
      font-size: 22px;
      line-height: 30px;
      font-weight: 500;
    }

    .pill {
      height: 30px;
      min-width: 72px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 999px;
      border: 1px solid;
      padding: 0 12px;
      font-size: 13px;
      font-weight: 700;
    }

    .pill.synced {
      border-color: var(--synced-line);
      background: var(--synced-bg);
      color: var(--synced-text);
    }

    .pill.unsynced {
      border-color: var(--unsynced-line);
      background: var(--unsynced-bg);
      color: var(--unsynced-text);
    }

    .copy {
      width: 37px;
      height: 37px;
      display: grid;
      place-items: center;
      border-radius: 8px;
      border: 1px solid #3a3a3a;
      background: #333;
      color: #f1f1f1;
    }

    .copy svg {
      width: 18px;
      height: 18px;
      stroke: currentColor;
      stroke-width: 2;
      fill: none;
    }
  </style>
</head>
<body>
  <main class="frame">
    <section class="card">
      <div class="inner">
        <div class="head">
          <h1>最近同步内容</h1>
          <div class="meta">
            <span>最近 5 条历史记录</span>
            <span class="more">更多</span>
          </div>
        </div>

        <div class="list">
          <article class="row">
            <p class="text">图片 723 KB</p>
            <span class="pill synced">已同步</span>
            <span class="copy" aria-hidden="true">
              <svg viewBox="0 0 24 24"><rect x="9" y="9" width="11" height="11" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
            </span>
          </article>
          <article class="row">
            <p class="text">图片 535 KB</p>
            <span class="pill unsynced">未同步</span>
            <span class="copy" aria-hidden="true">
              <svg viewBox="0 0 24 24"><rect x="9" y="9" width="11" height="11" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
            </span>
          </article>
          <article class="row">
            <p class="text">图片 211 KB</p>
            <span class="pill synced">已同步</span>
            <span class="copy" aria-hidden="true">
              <svg viewBox="0 0 24 24"><rect x="9" y="9" width="11" height="11" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
            </span>
          </article>
          <article class="row">
            <p class="text">ssh root@10.194.33.156</p>
            <span class="pill unsynced">未同步</span>
            <span class="copy" aria-hidden="true">
              <svg viewBox="0 0 24 24"><rect x="9" y="9" width="11" height="11" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
            </span>
          </article>
          <article class="row">
            <p class="text">给我完整的设计文档、开发步骤和验收方案合一的 md 文件</p>
            <span class="pill synced">已同步</span>
            <span class="copy" aria-hidden="true">
              <svg viewBox="0 0 24 24"><rect x="9" y="9" width="11" height="11" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
            </span>
          </article>
        </div>
      </div>
    </section>
  </main>
</body>
</html>
